<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#F5EFE6"/>
  <!-- Subtelne włókna pergaminu w tle -->
  <rect width="200" height="200" fill="url(#g1)" opacity="0.4"/>
  <defs>
    <pattern id="g1" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#A67C3A" stroke-width="0.3" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Okno terminala -->
  <rect x="30" y="50" width="140" height="105" rx="4" fill="#FFFFFF" stroke="#3D2817" stroke-width="1.5"/>
  <!-- Pasek tytułu -->
  <rect x="30" y="50" width="140" height="20" rx="4" fill="#3D2817"/>
  <rect x="30" y="66" width="140" height="4" fill="#3D2817"/>
  <!-- "Traffic lights" -->
  <circle cx="44" cy="60" r="3" fill="#A63D40"/>
  <circle cx="54" cy="60" r="3" fill="#A67C3A"/>
  <circle cx="64" cy="60" r="3" fill="#4A7C59"/>
  <!-- Filename label -->
  <text x="100" y="90" text-anchor="middle" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" fill="#3D2817" font-weight="700">.skill</text>
  <!-- "Code lines" -->
  <rect x="42" y="102" width="54" height="2.5" fill="#A67C3A" rx="1"/>
  <rect x="42" y="111" width="78" height="2.5" fill="#6B4423" opacity="0.55" rx="1"/>
  <rect x="42" y="120" width="38" height="2.5" fill="#A67C3A" rx="1"/>
  <rect x="42" y="129" width="68" height="2.5" fill="#6B4423" opacity="0.55" rx="1"/>
  <rect x="42" y="138" width="48" height="2.5" fill="#6B4423" opacity="0.55" rx="1"/>
  <rect x="42" y="147" width="60" height="2.5" fill="#A67C3A" rx="1"/>
  <!-- Bóbr-watermark w prawym dolnym -->
  <g opacity="0.5">
    <ellipse cx="160" cy="173" rx="14" ry="11" fill="#3D2817"/>
    <circle cx="170" cy="170" r="6" fill="#3D2817"/>
    <rect x="173.5" y="172" width="1.2" height="3" rx="0.3" fill="#FAF6F0"/>
    <rect x="175.3" y="172" width="1.2" height="3" rx="0.3" fill="#FAF6F0"/>
  </g>
</svg>
