<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tło zaokrąglony kwadrat, kremowy pergamin -->
  <rect width="32" height="32" rx="6" fill="#F5EFE6"/>

  <!-- Uszy (rysowane przed głową, dolna część zostanie zasłonięta) -->
  <circle cx="9" cy="9.5" r="2.6" fill="#3D2817"/>
  <circle cx="23" cy="9.5" r="2.6" fill="#3D2817"/>

  <!-- Głowa (główny owal) -->
  <ellipse cx="16" cy="18" rx="10" ry="8" fill="#3D2817"/>

  <!-- Pyszczek / dolna część twarzy, ciemniejszy akcent -->
  <ellipse cx="16" cy="22" rx="5.8" ry="3" fill="#2A1810"/>

  <!-- Nos (miodowy bursztyn) -->
  <ellipse cx="16" cy="19.2" rx="1.5" ry="1" fill="#A67C3A"/>

  <!-- Oczy -->
  <circle cx="12" cy="15" r="1.2" fill="#1A0F08"/>
  <circle cx="20" cy="15" r="1.2" fill="#1A0F08"/>
  <circle cx="12.35" cy="14.65" r="0.35" fill="#F5EFE6"/>
  <circle cx="20.35" cy="14.65" r="0.35" fill="#F5EFE6"/>

  <!-- Charakterystyczne dwa siekacze (kość słoniowa) -->
  <rect x="13.8" y="21" width="1.8" height="5.2" rx="0.4" fill="#FAF6F0"/>
  <rect x="16.4" y="21" width="1.8" height="5.2" rx="0.4" fill="#FAF6F0"/>
  <!-- delikatna linia rozdzielająca zęby -->
  <line x1="16" y1="21.3" x2="16" y2="25.8" stroke="#D9CFC0" stroke-width="0.15"/>
</svg>
